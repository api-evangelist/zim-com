aid: zim-com
name: ZIM Integrated Shipping Services
description: >-
  ZIM Integrated Shipping Services Ltd. (NYSE: ZIM) is a global container
  liner shipping company founded in 1945 and headquartered in Haifa, Israel.
  ZIM operates in more than 90 countries, serving over 30,000 customers
  across more than 300 ports worldwide with a differentiated global-niche
  strategy focused on agile fleet management and select trade lanes. The
  company is publicly traded on the New York Stock Exchange and, as of
  2026, is the subject of a pending acquisition by Hapag-Lloyd at
  approximately $35.00 per share. ZIM's digital surface includes the myZIM
  customer area, ZIMonitor cargo visibility, an electronic Bill of Lading
  (eB/L) service, a Draft B/L tool, EDI integrations for booking and
  shipping instructions, a mobile application, and a developer API portal
  at api.zim.com hosted on Microsoft Azure API Management. Access to the
  ZIM API requires registering through ZIM API Support and obtaining a
  security token; rate limits are set per organization at registration.
  No public OpenAPI specification, SDKs, or GitHub organization are
  published, so ZIM is profiled here as a Tier-3 catalog entry pending
  spec disclosure or partner access.
